name: Yarn OIDC Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - uses: actions/checkout@v6
      # ✅ Enable Corepack + Yarn 3
      - name: Setup Yarn
        run: |
          corepack enable
          corepack prepare yarn@3.6.4 --activate
          yarn -v

      # ✅ Install
      - run: yarn install --immutable

      # ✅ Setup Node (OIDC + registry)
      - uses: Satishchoudhary94/setup-node@fix/oidc-support-1440
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@chiranjib-infosys"
          cache: yarn


      # ✅ Optional build
      - run: yarn build
        continue-on-error: true

      # ✅ Get current version from npm (IMPORTANT FIX)
      - name: Get current npm version
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(npm view $PKG_NAME version || echo "0.0.0")
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV

      # ✅ Bump version (npm only)
      - name: Bump version
        run: |
          NEW_VERSION=$(node -e "
            const v = process.env.CURRENT_VERSION.split('.');
            v[2] = Number(v[2]) + 1;
            console.log(v.join('.'));
          ")
          echo "Publishing version: $NEW_VERSION"
          npm version "$NEW_VERSION" --no-git-tag-version

    #   - name: Configure npmjs registry auth
    #     run: |
    #         yarn config set npmRegistryServer "https://registry.npmjs.org"
    #         yarn config set npmAlwaysAuth true
    #         yarn config set npmAuthToken $NPM_AUTH_TOKEN
    #     env:
    #       NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}


      # ✅ Publish using Yarn (OIDC works via setup-node)
      - name: Publish to npm
        env:
            NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
            yarn npm publish --access public