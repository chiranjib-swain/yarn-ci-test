name: CI Yarn
on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        # This is the key step for Yarn Berry
        run: corepack enable

      - name: Setup Node.js
        uses: Satishchoudhary94/setup-node@fix/oidc-support-1440
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run Build
        run: yarn build
