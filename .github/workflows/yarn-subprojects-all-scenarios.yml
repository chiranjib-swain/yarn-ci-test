name: yarn-subprojects-all-scenarios

on:
  workflow_dispatch:

jobs:

  # ✅ 1. Mixed (Yarn1 + Yarn2 + Yarn3)
  yarn-subprojects:
    name: Yarn subprojects (mixed)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Prepare sub-projects (mixed)
        shell: bash
        run: |
          set -e
          export YARN_ENABLE_IMMUTABLE_INSTALLS=false

          rm -f package.json package-lock.json || true

          # ---- sub2 (Yarn 2) ----
          mkdir sub2
          cd sub2
          echo '{"name":"sub2","dependencies":{"random":"^3.0.6","uuid":"^9.0.0"}}' > package.json
          corepack enable
          yarn set version 2.4.3
          touch yarn.lock
          yarn install

          # ---- sub3 (Yarn 3) ----
          cd ..
          mkdir sub3
          cd sub3
          echo '{"name":"sub3","dependencies":{"random":"^3.0.6","uuid":"^9.0.0"}}' > package.json
          yarn set version 3.5.1
          touch yarn.lock
          yarn install

          # remove local caches (force setup-node cache usage)
          cd ..
          rm -rf sub2/.yarn/cache sub3/.yarn/cache

          # ---- root (Yarn 1) ----
          echo '{"name":"root","dependencies":{"random":"^3.0.6","uuid":"^9.0.0"}}' > package.json
          yarn set version 1.22.19
          yarn install

      - name: Setup Node
        uses: Satishchoudhary94/setup-node@fix/oidc-support-1440
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          cache-dependency-path: |
            **/*.lock
            yarn.lock

  # ✅ 2. Berry Local (all local cache)
  yarn-subprojects-berry-local:
    name: Yarn subprojects (berry local)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Prepare sub-projects (local cache)
        run: |
          set -e

          mkdir sub2
          cd sub2
          echo '{"name":"sub2","dependencies":{"random":"^3.0.6","uuid":"^9.0.0"}}' > package.json
          corepack enable
          yarn set version 3.5.1
          touch yarn.lock
          yarn install

          cd ..
          mkdir sub3
          cd sub3
          echo '{"name":"sub3","dependencies":{"random":"^3.0.6","uuid":"^9.0.0"}}' > package.json
          yarn set version 3.5.1
          touch yarn.lock
          yarn install

      - name: Setup Node
        uses: Satishchoudhary94/setup-node@fix/oidc-support-1440
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          cache-dependency-path: |
            sub2/*.lock
            sub3/*.lock

  # ✅ 3. Berry Global (mixed cache)
  yarn-subprojects-berry-global:
    name: Yarn subprojects (berry global)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Prepare sub-projects (global cache)
        run: |
          set -e

          mkdir sub2
          cd sub2
          echo '{"name":"sub2","dependencies":{"random":"^3.0.6","uuid":"^9.0.0"}}' > package.json
          corepack enable
          yarn set version 3.5.1
          touch yarn.lock
          yarn install

          cd ..
          mkdir sub3
          cd sub3
          echo '{"name":"sub3","dependencies":{"random":"^3.0.6","uuid":"^9.0.0"}}' > package.json
          yarn set version 3.5.1
          echo "enableGlobalCache: true" >> .yarnrc.yml
          touch yarn.lock
          yarn install

      - name: Setup Node
        uses: Satishchoudhary94/setup-node@fix/oidc-support-1440
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          cache-dependency-path: |
            sub2/*.lock
            sub3/*.lock

  # ✅ 4. Berry Git (repo-managed cache)
  yarn-subprojects-berry-git:
    name: Yarn subprojects (berry git cache)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Prepare sub-projects (git cache)
        run: |
          set -e

          mkdir sub2
          cd sub2
          echo '{"name":"sub2","dependencies":{"random":"^3.0.6","uuid":"^9.0.0"}}' > package.json
          corepack enable
          yarn set version 3.5.1
          touch yarn.lock
          yarn install

          cd ..
          mkdir sub3
          cd sub3
          echo '{"name":"sub3","dependencies":{"random":"^3.0.6","uuid":"^9.0.0"}}' > package.json
          yarn set version 3.5.1
          touch yarn.lock
          yarn install

      - name: Setup Node
        uses: Satishchoudhary94/setup-node@fix/oidc-support-1440
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          cache-dependency-path: |
            sub2/*.lock
            sub3/*.lock